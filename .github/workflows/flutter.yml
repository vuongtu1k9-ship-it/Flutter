name: Flutter CI

on:
  push:
    branches: [ cotuong ]
  pull_request:
    branches: [ cotuong ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.5'

      - name: Create project
        run: |
          rm -rf *
          rm -rf .*
          flutter create --org com.xiangqi --project-name xiangqi --platforms android .

      - name: Copy source
        run: |
          mkdir -p lib/models

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk