name: xiangqi_mobile
description: A new Flutter project for cotuong.xyz
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  socket_io_client: ^2.0.3
  flutter_svg: ^2.0.9
  provider: ^6.1.1
  google_sign_in: ^6.2.2
  shared_preferences: ^2.5.3
  audioplayers: ^6.1.0
  path_provider: ^2.1.2
  archive: ^3.4.10
  ffi: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/pieces/
    - assets/sounds/
    - assets/themes/
